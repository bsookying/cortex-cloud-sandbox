name: 2 - Create Infrastructure and Deploy Applications
on: workflow_dispatch

jobs:
  build-infra:
    runs-on: ubuntu-latest
    outputs:
      container_matrix: ${{ steps.container_list.outputs.container_dirs }}
      image_tag: ${{ steps.image_tag.outputs.tag }}
      cluster_name: ${{ steps.gke-cluster.outputs.cluster_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Auth with static SA key
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: gcloud is ready
        uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3

      - name: Return TF state bucket
        id: state-bucket
        run: |
          set -euo pipefail
          BUCKET=$(gcloud storage buckets list --filter="name:terraform-state" --format="value(name)")
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"

      - name: Initiatlize TF
        working-directory: terraform/
        env:
          TF_BUCKET: ${{ steps.state-bucket.outputs.bucket }}
          STATE_PATH: "pov-infra"
        run: |
          terraform init -reconfigure -backend-config="bucket=${TF_BUCKET}" -backend-config="prefix=${STATE_PATH}"

      - name: Terraform apply
        working-directory: terraform/
        run: terraform apply -auto-approve --var=project_id=${{ vars.GCP_PROJECT_ID }} -var-file=project-name.tfvars

      - name: Return GKE cluster name
        id: gke-cluster
        run: |
          set -euo pipefail
          CLUSTER_NAME=$(gcloud container clusters list --filter="name:*" --format="value(name)")
          echo "cluster_name=$CLUSTER_NAME" >> "$GITHUB_OUTPUT"        

      - name: Get GKE credentials
        uses: 'google-github-actions/get-gke-credentials@v3'
        with:
          cluster_name: ${{ steps.gke-cluster.outputs.cluster_name }}
          location: 'us-central1'

      - name: Deploy Nginx
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx 
          helm repo update 
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx --namespace ingress-nginx --create-namespace

      - name: List all containers to build
        id: container_list
        working-directory: containers/
        run: |
          containers=$(ls -d */ | cut -f1 -d'/' | jq -R -s -c 'split("\n")[:-1]')
          echo "container_dirs=$containers" >> "$GITHUB_OUTPUT"

      - name: Set dynamic image tag
        id: image_tag
        run: |
          # Use the short 7-character commit SHA as the tag
          echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

  deploy-apps:
    runs-on: ubuntu-latest
    needs: build-infra
    strategy:
      fail-fast: true
      matrix:
        CONTAINER_DIR: ${{ fromJson(needs.build-infra.outputs.container_matrix) }}    
    env:
      REGISTRY_NAME: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}
      IMAGE_TAG: ${{ needs.build-infra.outputs.image_tag }}
      CLUSTER_NAME: ${{ needs.build-infra.outputs.cluster_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Auth with static SA key
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: gcloud is ready
        uses: google-github-actions/setup-gcloud@v3

      - name: Get GKE credentials
        uses: 'google-github-actions/get-gke-credentials@v3'
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: 'us-central1'

      - name: Build containers
        working-directory: containers/
        run: |
          cd ${{ matrix.CONTAINER_DIR }}
          docker build -t ${{ env.REGISTRY_NAME }}/${{ matrix.CONTAINER_DIR }}/${{ matrix.CONTAINER_DIR }}:${{ env.IMAGE_TAG }} .

      - name: Push container to GCP registry
        working-directory: containers/
        run: |
          cd ${{ matrix.CONTAINER_DIR }}
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://us-central1-docker.pkg.dev
          docker push ${{ env.REGISTRY_NAME }}/${{ matrix.CONTAINER_DIR }}/${{ matrix.CONTAINER_DIR }}:${{ env.IMAGE_TAG }}

      - name: Deploy from container repo to K8s cluster
        working-directory: containers/
        run: |
          cd ${{ matrix.CONTAINER_DIR }}
          export CONTAINER_NAME="${{ matrix.CONTAINER_DIR }}-prod"
          export CONTAINER_IMAGE="${{ env.REGISTRY_NAME }}/${{ matrix.CONTAINER_DIR }}/${{ matrix.CONTAINER_DIR }}:${{ env.IMAGE_TAG }}"
          envsubst < ${{ matrix.CONTAINER_DIR }}-deploy.yml | kubectl apply -f -